name: Build and Deploy Feed

on:
  push:
    branches: [ main ]
    paths:
      - 'feeds.txt'
      - '.github/workflows/deploy.yml'
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

concurrency:
  group: feed-build
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Tinyfeed
        run: |
          set -e
          curl -L -o tinyfeed https://github.com/TheBigRoomXXL/tinyfeed/releases/download/v1.5.0/tinyfeed_linux_arm64
          chmod +x tinyfeed

      - name: Generate HTML
        run: |
          set -e
          ./tinyfeed --input feeds.txt --output src/index.html

      # 👇 上传为 Pages artifact
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./src

  deploy:
    needs: build
    runs-on: ubuntu-latest

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to Pages
        id: deployment
        uses: actions/deploy-pages@v4
